name: Daily brain ingestion

on:
  schedule:
    # Runs at 06:00 UTC every day (adjust to your timezone)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI
    inputs:
      brain:
        description: "Specific brain to run (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (don't write files)"
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated brain files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run ingestion
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL || 'google/gemini-flash-1.5' }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:        ${{ github.repository }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.brain }}" ]; then
            ARGS="--brain ${{ github.event.inputs.brain }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python ingestion/ingest.py $ARGS

      - name: Commit updated brain files
        run: |
          git config user.name  "brain-bot"
          git config user.email "brain-bot@users.noreply.github.com"
          git add brains/ ingestion/state.json || true
          git diff --staged --quiet || git commit -m "brain update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
